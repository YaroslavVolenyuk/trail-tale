<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</helmet>

<div style="min-height:100vh; background:#1A1A1A; display:flex; align-items:center; justify-content:center; padding:48px 24px; font-family:'Inter',sans-serif;">
  <x-import component="IOSDevice" from="./ios-frame.jsx" dark="{{ true }}" hint-size="402px,874px">
    <div style="height:100%; display:flex; flex-direction:column; background:#0A0A0A; font-family:'Inter',sans-serif;">

      <div style="height:59px; flex-shrink:0;"></div>

      <!-- Top bar -->
      <div style="flex-shrink:0; display:flex; align-items:center; padding:6px 12px; height:50px;">
        <div style="width:44px; height:44px; display:flex; align-items:center; cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </div>
        <div style="flex:1; text-align:center; font-size:17px; font-weight:600; color:#fff; margin-right:44px; font-family:'Inter',sans-serif;">New Game</div>
      </div>

      <!-- Scrollable content -->
      <div style="flex:1; overflow-y:auto; padding:20px 24px 0;">

        <!-- Language section -->
        <div style="font-size:13px; font-weight:500; color:#8E8E93; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; font-family:'Inter',sans-serif;">Choose language</div>
        <div style="display:flex; gap:8px; margin-bottom:32px;">
          <button onClick="{{ setUA }}" style="flex:1; height:40px; border-radius:999px; border:none; background:{{ uaBg }}; color:{{ uaColor }}; font-size:14px; font-weight:500; font-family:'Inter',sans-serif; cursor:pointer; transition:background 0.15s;">🇺🇦 UA</button>
          <button onClick="{{ setEN }}" style="flex:1; height:40px; border-radius:999px; border:none; background:{{ enBg }}; color:{{ enColor }}; font-size:14px; font-weight:500; font-family:'Inter',sans-serif; cursor:pointer; transition:background 0.15s;">🇬🇧 EN</button>
          <button onClick="{{ setDE }}" style="flex:1; height:40px; border-radius:999px; border:none; background:{{ deBg }}; color:{{ deColor }}; font-size:14px; font-weight:500; font-family:'Inter',sans-serif; cursor:pointer; transition:background 0.15s;">🇦🇹 DE</button>
        </div>

        <!-- Mode section -->
        <div style="font-size:13px; font-weight:500; color:#8E8E93; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; font-family:'Inter',sans-serif;">How do you play?</div>
        <div style="display:flex; flex-direction:column; gap:12px;">

          <!-- Solo card -->
          <div onClick="{{ setSolo }}" style="background:{{ soloBg }}; border-radius:16px; padding:20px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; position:relative; overflow:hidden; transition:background 0.15s;">
            <div style="position:absolute; left:0; top:0; bottom:0; width:2px; background:{{ soloAccent }};"></div>
            <div style="margin-left:10px; flex-shrink:0;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div style="flex:1;">
              <div style="font-size:17px; font-weight:700; color:#fff; font-family:'Inter',sans-serif;">Solo</div>
              <div style="font-size:14px; color:#8E8E93; margin-top:3px; font-family:'Inter',sans-serif;">Play on your own</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="m9 18 6-6-6-6"/>
            </svg>
          </div>

          <!-- Team card -->
          <div onClick="{{ setTeam }}" style="background:{{ teamBg }}; border-radius:16px; padding:20px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; position:relative; overflow:hidden; transition:background 0.15s;">
            <div style="position:absolute; left:0; top:0; bottom:0; width:2px; background:{{ teamAccent }};"></div>
            <div style="margin-left:10px; flex-shrink:0;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div style="flex:1;">
              <div style="font-size:17px; font-weight:700; color:#fff; font-family:'Inter',sans-serif;">Team</div>
              <div style="font-size:14px; color:#8E8E93; margin-top:3px; font-family:'Inter',sans-serif;">Share a code with friends</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="m9 18 6-6-6-6"/>
            </svg>
          </div>

        </div>
      </div>

      <!-- Bottom Continue button -->
      <div style="flex-shrink:0; padding:16px 24px 40px;">
        <button style="width:100%; height:52px; background:#F5A623; border:none; border-radius:14px; color:#0A0A0A; font-size:17px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer;">Continue</button>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:960}}">
class Component extends DCLogic {
  state = { lang: 'EN', mode: 'solo' };
  renderVals() {
    const { lang, mode } = this.state;
    return {
      setUA: () => this.setState({ lang: 'UA' }),
      setEN: () => this.setState({ lang: 'EN' }),
      setDE: () => this.setState({ lang: 'DE' }),
      setSolo: () => this.setState({ mode: 'solo' }),
      setTeam: () => this.setState({ mode: 'team' }),
      uaBg: lang === 'UA' ? '#F5A623' : '#2C2C2E',
      uaColor: lang === 'UA' ? '#0A0A0A' : '#8E8E93',
      enBg: lang === 'EN' ? '#F5A623' : '#2C2C2E',
      enColor: lang === 'EN' ? '#0A0A0A' : '#8E8E93',
      deBg: lang === 'DE' ? '#F5A623' : '#2C2C2E',
      deColor: lang === 'DE' ? '#0A0A0A' : '#8E8E93',
      soloBg: mode === 'solo' ? '#232323' : '#1C1C1E',
      soloAccent: mode === 'solo' ? '#F5A623' : 'transparent',
      teamBg: mode === 'team' ? '#232323' : '#1C1C1E',
      teamAccent: mode === 'team' ? '#F5A623' : 'transparent',
    };
  }
}
</script>
</body>
</html>
