<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; }
    input::placeholder { color: #9E9E9E; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 3px; }
  </style>
</helmet>

<div style="min-height:100vh; background:#E0E0E0; display:flex; align-items:flex-start; justify-content:center; padding:32px;">
  <x-import component="ChromeWindow" from="./browser-window.jsx" width="{{ w }}" height="{{ h }}" url="admin.trailtale.io/quests" hint-size="1440px,830px">

    <div style="display:flex; height:100%; overflow:hidden; background:#fff;">

      <!-- Sidebar -->
      <div style="width:240px; flex-shrink:0; background:#F5F5F7; border-right:1px solid #E5E5E7; display:flex; flex-direction:column; height:100%;">
        <div style="padding:22px 16px 16px; display:flex; align-items:center; gap:8px;">
          <div style="width:8px; height:8px; border-radius:50%; background:#F5A623; flex-shrink:0;"></div>
          <span style="font-size:16px; font-weight:700; color:#1C1C1E;">TrailTale Admin</span>
        </div>
        <div style="height:1px; background:#E5E5E7; margin:0 16px 8px;"></div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid #F5A623; background:#FFF8EC;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="font-size:14px; font-weight:500; color:#F5A623;">Quests</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Players</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Analytics</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Settings</span>
        </div>
      </div>

      <!-- Main content -->
      <div style="flex:1; overflow-y:auto; padding:32px;">

        <!-- Header -->
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
          <h1 style="font-size:28px; font-weight:700; color:#1C1C1E; margin:0; letter-spacing:-0.4px;">My Quests</h1>
          <button style="height:40px; padding:0 16px; background:#F5A623; border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            New Quest
          </button>
        </div>

        <!-- Search bar -->
        <div style="position:relative; max-width:480px;">
          <div style="position:absolute; left:12px; top:50%; transform:translateY(-50%); pointer-events:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </div>
          <input type="text" placeholder="Search quests" style="width:100%; height:40px; background:#F5F5F7; border:1px solid #E5E5E7; border-radius:10px; padding:0 12px 0 36px; font-size:14px; color:#1C1C1E; font-family:'Inter',sans-serif;" />
        </div>

        <!-- Quest grid -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px;">

          <!-- Card 1: Faust Quest -->
          <div style="background:#fff; border:1px solid #E5E5E7; border-radius:16px; overflow:hidden; cursor:pointer;">
            <div style="height:80px; background:linear-gradient(135deg, #F5A623 0%, #D4851A 100%); display:flex; align-items:flex-end; padding:10px 16px;">
              <span style="font-size:15px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.25);">Faust Quest</span>
            </div>
            <div style="padding:16px;">
              <div style="font-size:16px; font-weight:700; color:#1C1C1E; margin-bottom:4px;">Faust Quest</div>
              <div style="font-size:13px; color:#6E6E73; margin-bottom:14px;">Vienna · 6 clues</div>
              <span style="font-size:12px; font-weight:500; background:#DCFCE7; color:#166534; padding:4px 10px; border-radius:999px;">Published</span>
              <div style="display:flex; align-items:center; gap:10px; margin-top:16px;">
                <button style="height:32px; padding:0 14px; border:1.5px solid #F5A623; border-radius:7px; background:transparent; color:#F5A623; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Edit</button>
                <button style="height:32px; padding:0 14px; border:none; background:transparent; color:#6E6E73; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">View Live ↗</button>
              </div>
            </div>
          </div>

          <!-- Card 2: Old Town Mystery -->
          <div style="background:#fff; border:1px solid #E5E5E7; border-radius:16px; overflow:hidden; cursor:pointer;">
            <div style="height:80px; background:linear-gradient(135deg, #4A7DB5 0%, #2D5F8A 100%); display:flex; align-items:flex-end; padding:10px 16px;">
              <span style="font-size:15px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.25);">Old Town Mystery</span>
            </div>
            <div style="padding:16px;">
              <div style="font-size:16px; font-weight:700; color:#1C1C1E; margin-bottom:4px;">Old Town Mystery</div>
              <div style="font-size:13px; color:#6E6E73; margin-bottom:14px;">Prague · 8 clues</div>
              <span style="font-size:12px; font-weight:500; background:#FEF9C3; color:#854D0E; padding:4px 10px; border-radius:999px;">Draft</span>
              <div style="display:flex; align-items:center; gap:10px; margin-top:16px;">
                <button style="height:32px; padding:0 14px; border:1.5px solid #F5A623; border-radius:7px; background:transparent; color:#F5A623; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Edit</button>
                <button style="height:32px; padding:0 14px; border:none; background:transparent; color:#6E6E73; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif;">View Live ↗</button>
              </div>
            </div>
          </div>

          <!-- Empty new quest card -->
          <div style="border:1.5px dashed #E5E5E7; border-radius:16px; min-height:190px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; background:#FAFAFA;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C7C7CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span style="font-size:14px; color:#6E6E73; font-family:'Inter',sans-serif;">New Quest</span>
          </div>

        </div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1500,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return { w: 1440, h: 830 };
  }
}
</script>
</body>
</html>
