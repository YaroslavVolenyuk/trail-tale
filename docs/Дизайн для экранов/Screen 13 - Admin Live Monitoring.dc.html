<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 3px; }
  </style>
</helmet>

<div style="min-height:100vh; background:#E0E0E0; display:flex; align-items:flex-start; justify-content:center; padding:32px;">
  <x-import component="ChromeWindow" from="./browser-window.jsx" width="{{ w }}" height="{{ h }}" url="admin.trailtale.io/quests/faust-quest/live" hint-size="1440px,830px">

    <div style="display:flex; height:100%; overflow:hidden; background:#fff;">

      <!-- Sidebar (Players active) -->
      <div style="width:240px; flex-shrink:0; background:#F5F5F7; border-right:1px solid #E5E5E7; display:flex; flex-direction:column; height:100%;">
        <div style="padding:22px 16px 16px; display:flex; align-items:center; gap:8px;">
          <div style="width:8px; height:8px; border-radius:50%; background:#F5A623; flex-shrink:0;"></div>
          <span style="font-size:16px; font-weight:700; color:#1C1C1E;">TrailTale Admin</span>
        </div>
        <div style="height:1px; background:#E5E5E7; margin:0 16px 8px;"></div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Quests</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid #F5A623; background:#FFF8EC;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F5A623" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span style="font-size:14px; font-weight:500; color:#F5A623;">Players</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Analytics</span>
        </div>
        <div style="height:44px; padding:0 13px; display:flex; align-items:center; gap:10px; cursor:pointer; border-left:3px solid transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span style="font-size:14px; font-weight:500; color:#6E6E73;">Settings</span>
        </div>
      </div>

      <!-- Main content -->
      <div style="flex:1; overflow-y:auto; padding:32px;">

        <!-- Header -->
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
          <h1 style="font-size:24px; font-weight:700; color:#1C1C1E; margin:0; letter-spacing:-0.3px; flex:1;">Faust Quest — Live</h1>
          <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:8px; height:8px; border-radius:50%; background:#32D74B; animation:livepulse 1.5s ease-in-out infinite;"></div>
            <span style="font-size:13px; font-weight:500; color:#32D74B;">Live</span>
          </div>
          <div style="display:flex; align-items:center; gap:6px; color:#6E6E73;">
            <span style="font-size:13px;">Last updated 5s ago</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6E6E73" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style="cursor:pointer;"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </div>
        </div>

        <!-- Filter tabs -->
        <div style="display:flex; gap:8px; margin-bottom:16px;">
          <button onClick="{{ setAll }}" style="height:32px; padding:0 14px; border:none; border-radius:999px; background:{{ allBg }}; color:{{ allColor }}; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">All (3)</button>
          <button onClick="{{ setActive }}" style="height:32px; padding:0 14px; border:none; border-radius:999px; background:{{ activeBg }}; color:{{ activeColor }}; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Active (2)</button>
          <button onClick="{{ setFinished }}" style="height:32px; padding:0 14px; border:none; border-radius:999px; background:{{ finishedBg }}; color:{{ finishedColor }}; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Finished (1)</button>
          <button onClick="{{ setStuck }}" style="height:32px; padding:0 14px; border:none; border-radius:999px; background:{{ stuckBg }}; color:{{ stuckColor }}; font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Stuck (1)</button>
        </div>

        <!-- Table -->
        <div style="background:#fff; border:1px solid #E5E5E7; border-radius:12px; overflow:hidden;">

          <!-- Table header -->
          <div style="display:grid; grid-template-columns:2fr 1.5fr 80px 90px 110px 180px; padding:0 16px; height:44px; align-items:center; border-bottom:2px solid #F5F5F7;">
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Team / Player</span>
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Progress</span>
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Time</span>
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Attempts</span>
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Last Active</span>
            <span style="font-size:12px; font-weight:500; color:#6E6E73; text-transform:uppercase; letter-spacing:0.06em;">Actions</span>
          </div>

          <!-- Row 1: Вовки (active, normal) -->
          <div style="display:grid; grid-template-columns:2fr 1.5fr 80px 90px 110px 180px; padding:0 16px; height:60px; align-items:center; border-bottom:1px solid #F5F5F7;">
            <span style="font-size:14px; font-weight:600; color:#1C1C1E;">🐺 Вовки</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="width:100px; height:4px; background:#E5E5E7; border-radius:999px; overflow:hidden;">
                <div style="width:67%; height:100%; background:#F5A623;"></div>
              </div>
              <span style="font-size:12px; color:#6E6E73;">4 / 6</span>
            </div>
            <span style="font-size:14px; color:#1C1C1E;">47 min</span>
            <span style="font-size:14px; color:#1C1C1E;">8</span>
            <span style="font-size:13px; color:#6E6E73;">2m ago</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <button style="height:30px; padding:0 10px; border:1.5px solid #F5A623; border-radius:6px; background:transparent; color:#F5A623; font-size:12px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Reset</button>
              <button style="height:30px; padding:0 10px; border:1.5px solid #E5E5E7; border-radius:6px; background:transparent; color:#6E6E73; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif;">Skip</button>
              <div style="width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF453A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </div>
            </div>
          </div>

          <!-- Row 2: Solo #B7C1 (STUCK — red tint, left border) -->
          <div style="display:grid; grid-template-columns:2fr 1.5fr 80px 90px 110px 180px; padding:0 16px; height:60px; align-items:center; border-bottom:1px solid #F5F5F7; background:#FFF5F5; border-left:3px solid #FF453A;">
            <div>
              <span style="font-size:14px; font-weight:600; color:#1C1C1E;">👤 Solo #B7C1</span>
              <div style="font-size:11px; color:#FF453A; margin-top:1px;">Stuck on Clue 1</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="width:100px; height:4px; background:#E5E5E7; border-radius:999px; overflow:hidden;">
                <div style="width:17%; height:100%; background:#F5A623;"></div>
              </div>
              <span style="font-size:12px; color:#6E6E73;">1 / 6</span>
            </div>
            <span style="font-size:14px; color:#1C1C1E;">12 min</span>
            <span style="font-size:14px; font-weight:700; color:#FF453A;">22</span>
            <span style="font-size:13px; color:#6E6E73;">30s ago</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <button style="height:30px; padding:0 10px; border:1.5px solid #F5A623; border-radius:6px; background:transparent; color:#F5A623; font-size:12px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;">Reset</button>
              <button style="height:30px; padding:0 10px; border:1.5px solid #E5E5E7; border-radius:6px; background:transparent; color:#6E6E73; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif;">Skip</button>
              <div style="width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF453A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </div>
            </div>
          </div>

          <!-- Row 3: Лисиці (finished) -->
          <div style="display:grid; grid-template-columns:2fr 1.5fr 80px 90px 110px 180px; padding:0 16px; height:60px; align-items:center;">
            <span style="font-size:14px; font-weight:600; color:#1C1C1E;">🦊 Лисиці</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#F5A623" stroke="none"><circle cx="12" cy="12" r="10"/><path d="M9 12.5l2.5 2.5 5-5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
              <span style="font-size:12px; color:#32D74B; font-weight:500;">Finished</span>
            </div>
            <span style="font-size:14px; color:#1C1C1E;">1h 12m</span>
            <span style="font-size:14px; color:#1C1C1E;">11</span>
            <span style="font-size:13px; color:#32D74B; font-weight:500;">Finished</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF453A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1500,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { filter: 'all' };
  renderVals() {
    const { filter } = this.state;
    const tab = (name) => ({
      bg: filter === name ? '#F5A623' : '#F5F5F7',
      color: filter === name ? '#fff' : '#6E6E73',
    });
    return {
      w: 1440, h: 830,
      setAll: () => this.setState({ filter: 'all' }),
      setActive: () => this.setState({ filter: 'active' }),
      setFinished: () => this.setState({ filter: 'finished' }),
      setStuck: () => this.setState({ filter: 'stuck' }),
      allBg: tab('all').bg, allColor: tab('all').color,
      activeBg: tab('active').bg, activeColor: tab('active').color,
      finishedBg: tab('finished').bg, finishedColor: tab('finished').color,
      stuckBg: tab('stuck').bg, stuckColor: tab('stuck').color,
    };
  }
}
</script>
</body>
</html>
