<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
  </style>
</helmet>

<div style="min-height:100vh; background:#1A1A1A; display:flex; align-items:center; justify-content:center; padding:48px 24px; font-family:'Inter',sans-serif;">
  <x-import component="IOSDevice" from="./ios-frame.jsx" dark="{{ true }}" hint-size="402px,874px">
    <div style="height:100%; display:flex; flex-direction:column; background:#0A0A0A; font-family:'Inter',sans-serif;">

      <div style="height:59px; flex-shrink:0;"></div>

      <!-- Top section: logo + name + tagline -->
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px 24px;">
        <svg width="72" height="84" viewBox="0 0 60 72" fill="none">
          <path d="M30 4C18 4 8 14 8 26C8 40 18 54 30 68C42 54 52 40 52 26C52 14 42 4 30 4Z" fill="#F5A623"/>
          <circle cx="30" cy="23" r="8.5" fill="#0A0A0A"/>
          <path d="M26 30L23 45H37L34 30H26Z" fill="#0A0A0A"/>
        </svg>
        <h1 style="font-size:32px; font-weight:700; color:#fff; margin:18px 0 0; letter-spacing:-0.6px; text-align:center; font-family:'Inter',sans-serif;">TrailTale</h1>
        <p style="font-size:16px; font-weight:400; color:#8E8E93; margin:10px 0 0; text-align:center; line-height:1.5; font-family:'Inter',sans-serif;">Explore the city. Solve the mystery.</p>
      </div>

      <!-- Middle breathing room -->
      <div style="flex:1;"></div>

      <!-- Bottom CTAs -->
      <div style="flex-shrink:0; padding:0 24px 44px;">
        <button style="width:100%; height:52px; background:#F5A623; border:none; border-radius:14px; color:#0A0A0A; font-size:17px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; letter-spacing:-0.2px;">Get Started</button>
        <div style="text-align:center; margin-top:18px; padding:6px 0 4px;">
          <span style="font-size:14px; color:#8E8E93; font-family:'Inter',sans-serif; cursor:pointer;">Have a team code?</span>
        </div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:960}}"></script>
</body>
</html>
