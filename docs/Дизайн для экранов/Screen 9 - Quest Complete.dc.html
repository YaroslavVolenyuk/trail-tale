<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
        <link
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"
        />
        <style>
          *,
          *::before,
          *::after {
            box-sizing: border-box;
          }
          body {
            margin: 0;
          }
          ::-webkit-scrollbar {
            display: none;
          }
          * {
            -ms-overflow-style: none;
            scrollbar-width: none;
          }
        </style>
      </helmet>

      <div
        style="
          min-height: 100vh;
          background: #1a1a1a;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 24px;
          font-family: 'Inter', sans-serif;
        "
      >
        <x-import
          component="IOSDevice"
          from="./ios-frame.jsx"
          dark="{{ true }}"
          hint-size="402px,874px"
        >
          <div
            style="
              height: 100%;
              display: flex;
              flex-direction: column;
              background: #0a0a0a;
              font-family: 'Inter', sans-serif;
            "
          >
            <div style="height: 59px; flex-shrink: 0"></div>

            <!-- Top bar (no back button) -->
            <div style="flex-shrink: 0; text-align: center; padding: 14px 20px 10px">
              <span
                style="
                  font-size: 17px;
                  font-weight: 600;
                  color: #fff;
                  font-family: 'Inter', sans-serif;
                "
                >TrailTale</span
              >
            </div>

            <!-- Scrollable content -->
            <div style="flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch">
              <!-- Trophy + title -->
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  padding: 32px 24px 0;
                  text-align: center;
                "
              >
                <svg
                  width="64"
                  height="64"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#F5A623"
                  strokeWidth="1.5"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                  <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                  <path d="M4 22h16" />
                  <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
                  <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
                  <path d="M18 2H6v7a6 6 0 0 0 12 0V2z" />
                </svg>
                <h1
                  style="
                    font-size: 30px;
                    font-weight: 700;
                    color: #fff;
                    margin: 16px 0 0;
                    letter-spacing: -0.4px;
                    font-family: 'Inter', sans-serif;
                  "
                >
                  Quest Complete
                </h1>
                <p
                  style="
                    font-size: 17px;
                    font-weight: 500;
                    color: #8e8e93;
                    margin: 6px 0 0;
                    font-family: 'Inter', sans-serif;
                  "
                >
                  🐺 Вовки
                </p>
              </div>

              <!-- Stats card -->
              <div
                style="
                  background: #1c1c1e;
                  border-radius: 16px;
                  margin: 24px 16px 0;
                  padding: 20px;
                  display: grid;
                  grid-template-columns: 1fr 1px 1fr 1px 1fr;
                  align-items: center;
                "
              >
                <div style="text-align: center">
                  <div
                    style="
                      font-size: 24px;
                      font-weight: 700;
                      color: #fff;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    1h 23m
                  </div>
                  <div
                    style="
                      font-size: 12px;
                      color: #8e8e93;
                      margin-top: 4px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    Time
                  </div>
                </div>
                <div style="background: #2c2c2e; align-self: stretch"></div>
                <div style="text-align: center">
                  <div
                    style="
                      font-size: 24px;
                      font-weight: 700;
                      color: #fff;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    6 / 6
                  </div>
                  <div
                    style="
                      font-size: 12px;
                      color: #8e8e93;
                      margin-top: 4px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    Clues
                  </div>
                </div>
                <div style="background: #2c2c2e; align-self: stretch"></div>
                <div style="text-align: center">
                  <div
                    style="
                      font-size: 24px;
                      font-weight: 700;
                      color: #fff;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    14
                  </div>
                  <div
                    style="
                      font-size: 12px;
                      color: #8e8e93;
                      margin-top: 4px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    Attempts
                  </div>
                </div>
              </div>

              <!-- Leaderboard -->
              <div style="padding: 24px 16px 0">
                <div
                  style="
                    font-size: 11px;
                    font-weight: 600;
                    color: #f5a623;
                    letter-spacing: 0.1em;
                    text-transform: uppercase;
                    margin-bottom: 12px;
                    font-family: 'Inter', sans-serif;
                  "
                >
                  Leaderboard
                </div>

                <!-- Row 1: current player -->
                <div
                  style="
                    display: flex;
                    align-items: center;
                    padding: 14px 12px;
                    background: #1c1c1e;
                    border-radius: 10px;
                    margin-bottom: 2px;
                    position: relative;
                    overflow: hidden;
                  "
                >
                  <div
                    style="
                      position: absolute;
                      left: 0;
                      top: 0;
                      bottom: 0;
                      width: 2px;
                      background: #f5a623;
                    "
                  ></div>
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 700;
                      color: #8e8e93;
                      width: 24px;
                      margin-left: 8px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    1
                  </div>
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 500;
                      color: #fff;
                      flex: 1;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    🐺 Вовки
                  </div>
                  <div style="font-size: 14px; color: #8e8e93; font-family: 'Inter', sans-serif">
                    1h 23m
                  </div>
                </div>

                <!-- Row 2 -->
                <div
                  style="display: flex; align-items: center; padding: 14px 12px; margin-bottom: 2px"
                >
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 700;
                      color: #8e8e93;
                      width: 32px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    2
                  </div>
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 500;
                      color: #fff;
                      flex: 1;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    👤 Solo_X7
                  </div>
                  <div style="font-size: 14px; color: #8e8e93; font-family: 'Inter', sans-serif">
                    1h 45m
                  </div>
                </div>

                <!-- Row 3 -->
                <div style="display: flex; align-items: center; padding: 14px 12px">
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 700;
                      color: #8e8e93;
                      width: 32px;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    3
                  </div>
                  <div
                    style="
                      font-size: 15px;
                      font-weight: 500;
                      color: #fff;
                      flex: 1;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    🦊 Лисиці
                  </div>
                  <div style="font-size: 14px; color: #8e8e93; font-family: 'Inter', sans-serif">
                    2h 01m
                  </div>
                </div>
              </div>

              <div style="height: 24px"></div>
            </div>

            <!-- Bottom two buttons -->
            <div
              style="
                flex-shrink: 0;
                padding: 16px 16px 40px;
                display: flex;
                flex-direction: column;
                gap: 10px;
              "
            >
              <button
                style="
                  width: 100%;
                  height: 52px;
                  background: #f5a623;
                  border: none;
                  border-radius: 14px;
                  color: #0a0a0a;
                  font-size: 17px;
                  font-weight: 600;
                  font-family: 'Inter', sans-serif;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 8px;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#0A0A0A"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <circle cx="18" cy="5" r="3" />
                  <circle cx="6" cy="12" r="3" />
                  <circle cx="18" cy="19" r="3" />
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
                Share Result
              </button>
              <button
                style="
                  width: 100%;
                  height: 52px;
                  background: #2c2c2e;
                  border: none;
                  border-radius: 14px;
                  color: #fff;
                  font-size: 17px;
                  font-weight: 600;
                  font-family: 'Inter', sans-serif;
                  cursor: pointer;
                "
              >
                Explore More Quests
              </button>
            </div>
          </div>
        </x-import>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":520,"height":960}}'
    ></script>
  </body>
</html>
