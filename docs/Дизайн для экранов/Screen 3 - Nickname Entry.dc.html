<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
        <link
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"
        />
        <style>
          *,
          *::before,
          *::after {
            box-sizing: border-box;
          }
          body {
            margin: 0;
          }
          input::placeholder {
            color: #8e8e93 !important;
            opacity: 1;
          }
          input:focus {
            outline: none;
          }
          ::-webkit-scrollbar {
            display: none;
          }
        </style>
      </helmet>

      <div
        style="
          min-height: 100vh;
          background: #1a1a1a;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 24px;
          font-family: 'Inter', sans-serif;
        "
      >
        <x-import
          component="IOSDevice"
          from="./ios-frame.jsx"
          dark="{{ true }}"
          keyboard="{{ true }}"
          hint-size="402px,874px"
        >
          <div
            style="
              height: 100%;
              display: flex;
              flex-direction: column;
              background: #0a0a0a;
              font-family: 'Inter', sans-serif;
            "
          >
            <div style="height: 59px; flex-shrink: 0"></div>

            <!-- Top bar -->
            <div
              style="
                flex-shrink: 0;
                display: flex;
                align-items: center;
                padding: 6px 12px;
                height: 50px;
              "
            >
              <div
                style="
                  width: 44px;
                  height: 44px;
                  display: flex;
                  align-items: center;
                  cursor: pointer;
                "
              >
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#8E8E93"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <path d="m15 18-6-6 6-6" />
                </svg>
              </div>
              <div
                style="
                  flex: 1;
                  text-align: center;
                  font-size: 17px;
                  font-weight: 600;
                  color: #fff;
                  margin-right: 44px;
                  font-family: 'Inter', sans-serif;
                "
              >
                Your Name
              </div>
            </div>

            <!-- Form content -->
            <div style="flex: 1; overflow-y: auto; padding: 32px 24px 16px">
              <h2
                style="
                  font-size: 28px;
                  font-weight: 700;
                  color: #fff;
                  margin: 0;
                  letter-spacing: -0.5px;
                  font-family: 'Inter', sans-serif;
                "
              >
                What's your name?
              </h2>
              <p
                style="
                  font-size: 15px;
                  color: #8e8e93;
                  margin: 6px 0 0;
                  font-family: 'Inter', sans-serif;
                "
              >
                Shown on the leaderboard
              </p>

              <!-- Input with counter -->
              <div style="position: relative; margin-top: 32px">
                <input
                  type="text"
                  value="{{ nickVal }}"
                  onChange="{{ onNick }}"
                  onFocus="{{ onFocus }}"
                  onBlur="{{ onBlur }}"
                  placeholder="Nickname"
                  maxlength="20"
                  style="width:100%; height:52px; background:#1C1C1E; border:{{ nickBorder }}; border-radius:12px; color:#fff; font-size:17px; font-weight:400; padding:0 60px 0 16px; font-family:'Inter',sans-serif; box-sizing:border-box; transition:border-color 0.15s;"
                />
                <span
                  style="
                    position: absolute;
                    top: 8px;
                    right: 12px;
                    font-size: 12px;
                    color: #8e8e93;
                    pointer-events: none;
                    font-family: 'Inter', sans-serif;
                    line-height: 1;
                  "
                  >{{ charCount }} / 20</span
                >
              </div>
            </div>

            <!-- Accessory bar above keyboard -->
            <div
              style="
                flex-shrink: 0;
                padding: 8px 16px 12px;
                background: #0a0a0a;
                border-top: 1px solid #2c2c2e;
              "
            >
              <button
                style="width:100%; height:52px; background:#F5A623; border:none; border-radius:14px; color:#0A0A0A; font-size:17px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; opacity:{{ continueOpacity }}; transition:opacity 0.15s;"
              >
                Continue
              </button>
            </div>
          </div>
        </x-import>
      </div>
    </x-dc>
    <script type="text/x-dc" data-dc-script data-props='{"$preview":{"width":520,"height":960}}'>
      class Component extends DCLogic {
        state = { nickVal: '', focused: false };
        renderVals() {
          const { nickVal, focused } = this.state;
          return {
            nickVal,
            charCount: nickVal.length,
            onNick: (e) => this.setState({ nickVal: e.target.value }),
            onFocus: () => this.setState({ focused: true }),
            onBlur: () => this.setState({ focused: false }),
            nickBorder: focused ? '1.5px solid #F5A623' : '1.5px solid #3A3A3C',
            continueOpacity: nickVal.trim() ? 1 : 0.4,
          };
        }
      }
    </script>
  </body>
</html>
