<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
        <link
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"
        />
        <style>
          *,
          *::before,
          *::after {
            box-sizing: border-box;
          }
          body {
            margin: 0;
            font-family: 'Inter', sans-serif;
          }
          input:focus,
          textarea:focus {
            outline: none;
          }
          textarea {
            resize: vertical;
          }
          ::-webkit-scrollbar {
            width: 6px;
          }
          ::-webkit-scrollbar-thumb {
            background: #d1d1d6;
            border-radius: 3px;
          }
        </style>
      </helmet>

      <div
        style="
          min-height: 100vh;
          background: #e0e0e0;
          display: flex;
          align-items: flex-start;
          justify-content: center;
          padding: 32px;
        "
      >
        <x-import
          component="ChromeWindow"
          from="./browser-window.jsx"
          width="{{ w }}"
          height="{{ h }}"
          url="admin.trailtale.io/quests/faust-quest/clue-1"
          hint-size="1440px,830px"
        >
          <div style="display: flex; height: 100%; overflow: hidden; background: #fff">
            <!-- Sidebar -->
            <div
              style="
                width: 240px;
                flex-shrink: 0;
                background: #f5f5f7;
                border-right: 1px solid #e5e5e7;
                display: flex;
                flex-direction: column;
                height: 100%;
              "
            >
              <div style="padding: 22px 16px 16px; display: flex; align-items: center; gap: 8px">
                <div
                  style="
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: #f5a623;
                    flex-shrink: 0;
                  "
                ></div>
                <span style="font-size: 16px; font-weight: 700; color: #1c1c1e"
                  >TrailTale Admin</span
                >
              </div>
              <div style="height: 1px; background: #e5e5e7; margin: 0 16px 8px"></div>
              <div
                style="
                  height: 44px;
                  padding: 0 13px;
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  cursor: pointer;
                  border-left: 3px solid #f5a623;
                  background: #fff8ec;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#F5A623"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
                <span style="font-size: 14px; font-weight: 500; color: #f5a623">Quests</span>
              </div>
              <div
                style="
                  height: 44px;
                  padding: 0 13px;
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  cursor: pointer;
                  border-left: 3px solid transparent;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#6E6E73"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                  <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <span style="font-size: 14px; font-weight: 500; color: #6e6e73">Players</span>
              </div>
              <div
                style="
                  height: 44px;
                  padding: 0 13px;
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  cursor: pointer;
                  border-left: 3px solid transparent;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#6E6E73"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <rect x="18" y="3" width="4" height="18" />
                  <rect x="10" y="8" width="4" height="13" />
                  <rect x="2" y="13" width="4" height="8" />
                </svg>
                <span style="font-size: 14px; font-weight: 500; color: #6e6e73">Analytics</span>
              </div>
              <div
                style="
                  height: 44px;
                  padding: 0 13px;
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  cursor: pointer;
                  border-left: 3px solid transparent;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#6E6E73"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                  />
                </svg>
                <span style="font-size: 14px; font-weight: 500; color: #6e6e73">Settings</span>
              </div>
            </div>

            <!-- Main content -->
            <div style="flex: 1; overflow-y: auto; padding: 32px">
              <!-- Top bar: breadcrumb + actions -->
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 24px;
                "
              >
                <div style="display: flex; align-items: center; gap: 6px; font-size: 14px">
                  <span style="color: #6e6e73; cursor: pointer">Quests</span>
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#C7C7CC"
                    strokeWidth="2"
                  >
                    <path d="m9 18 6-6-6-6" />
                  </svg>
                  <span style="color: #6e6e73; cursor: pointer">Faust Quest</span>
                  <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#C7C7CC"
                    strokeWidth="2"
                  >
                    <path d="m9 18 6-6-6-6" />
                  </svg>
                  <span style="color: #1c1c1e; font-weight: 500">Clue 1</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px">
                  <button
                    style="
                      height: 36px;
                      padding: 0 16px;
                      background: transparent;
                      border: none;
                      color: #6e6e73;
                      font-size: 14px;
                      cursor: pointer;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    Discard
                  </button>
                  <button
                    style="
                      height: 36px;
                      padding: 0 16px;
                      background: #f5a623;
                      border: none;
                      border-radius: 8px;
                      color: #fff;
                      font-size: 14px;
                      font-weight: 600;
                      cursor: pointer;
                      font-family: 'Inter', sans-serif;
                    "
                  >
                    Save Changes
                  </button>
                </div>
              </div>

              <div style="height: 1px; background: #e5e5e7; margin-bottom: 28px"></div>

              <!-- Two-column layout -->
              <div style="display: flex; gap: 24px; align-items: flex-start">
                <!-- Left column (60%) -->
                <div style="flex: 6">
                  <!-- Language tabs -->
                  <div style="display: flex; border-bottom: 2px solid #e5e5e7; margin-bottom: 24px">
                    <div
                      style="
                        padding: 10px 20px;
                        font-size: 14px;
                        font-weight: 600;
                        color: #f5a623;
                        border-bottom: 2px solid #f5a623;
                        margin-bottom: -2px;
                        cursor: pointer;
                      "
                    >
                      UA
                    </div>
                    <div
                      style="padding: 10px 20px; font-size: 14px; color: #6e6e73; cursor: pointer"
                    >
                      EN
                    </div>
                    <div
                      style="padding: 10px 20px; font-size: 14px; color: #6e6e73; cursor: pointer"
                    >
                      DE
                    </div>
                  </div>

                  <!-- Clue Title -->
                  <div style="margin-bottom: 20px">
                    <label
                      style="
                        display: block;
                        font-size: 13px;
                        font-weight: 500;
                        color: #6e6e73;
                        margin-bottom: 6px;
                      "
                      >Clue Title</label
                    >
                    <input
                      type="text"
                      value="The Basilisk's Lair"
                      style="
                        width: 100%;
                        height: 40px;
                        border: 1.5px solid #f5a623;
                        border-radius: 8px;
                        padding: 0 12px;
                        font-size: 14px;
                        color: #1c1c1e;
                        font-family: 'Inter', sans-serif;
                        background: #fff;
                      "
                    />
                  </div>

                  <!-- Clue Text -->
                  <div style="margin-bottom: 20px">
                    <label
                      style="
                        display: block;
                        font-size: 13px;
                        font-weight: 500;
                        color: #6e6e73;
                        margin-bottom: 6px;
                      "
                      >Clue Text</label
                    >
                    <textarea
                      style="
                        width: 100%;
                        height: 140px;
                        border: 1px solid #e5e5e7;
                        border-radius: 8px;
                        padding: 12px;
                        font-size: 14px;
                        color: #1c1c1e;
                        line-height: 1.6;
                        font-family: 'Inter', sans-serif;
                        background: #fff;
                      "
                    >
In the old quarter where merchants once traded secrets for gold, a stone beast guards the entrance to forgotten knowledge. Where its shadow falls at noon, the cobblestones whisper of a code carved by the guild. Count the steps from the eastern arch — what you seek is hidden in plain sight.</textarea
                    >
                  </div>

                  <!-- Hint (collapsible, shown open) -->
                  <div style="margin-bottom: 20px">
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        margin-bottom: 8px;
                        cursor: pointer;
                      "
                    >
                      <label
                        style="font-size: 13px; font-weight: 500; color: #6e6e73; cursor: pointer"
                        >Hint</label
                      >
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#9E9E9E"
                        strokeWidth="2"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                      >
                        <polyline points="18 15 12 9 6 15" />
                      </svg>
                    </div>
                    <textarea
                      style="
                        width: 100%;
                        height: 80px;
                        border: 1px solid #e5e5e7;
                        border-radius: 8px;
                        padding: 12px;
                        font-size: 14px;
                        color: #1c1c1e;
                        font-family: 'Inter', sans-serif;
                        background: #fff8ec;
                        line-height: 1.5;
                      "
                    >
Look for the carved initials on the northern wall near the bronze serpent sculpture.</textarea
                    >
                  </div>

                  <!-- Secret Code -->
                  <div>
                    <label
                      style="
                        display: block;
                        font-size: 13px;
                        font-weight: 500;
                        color: #6e6e73;
                        margin-bottom: 6px;
                      "
                      >Secret Code</label
                    >
                    <div style="display: flex; align-items: center; gap: 12px">
                      <div style="position: relative; width: 200px">
                        <input
                          type="password"
                          value="BASILISK"
                          style="
                            width: 100%;
                            height: 40px;
                            border: 1px solid #e5e5e7;
                            border-radius: 8px;
                            padding: 0 36px 0 12px;
                            font-size: 14px;
                            font-family: 'Courier New', monospace;
                            color: #1c1c1e;
                            letter-spacing: 0.15em;
                            background: #fff;
                          "
                        />
                        <div
                          style="
                            position: absolute;
                            right: 10px;
                            top: 50%;
                            transform: translateY(-50%);
                            cursor: pointer;
                          "
                        >
                          <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#9E9E9E"
                            strokeWidth="2"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                          >
                            <path
                              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                            />
                            <line x1="1" y1="1" x2="23" y2="23" />
                          </svg>
                        </div>
                      </div>
                      <span style="font-size: 12px; color: #9e9e9e">8 / 20 chars</span>
                    </div>
                  </div>
                </div>

                <!-- Right column (40%) -->
                <div style="flex: 4; display: flex; flex-direction: column; gap: 16px">
                  <!-- Location card -->
                  <div style="background: #f5f5f7; border-radius: 12px; padding: 16px">
                    <div
                      style="font-size: 13px; font-weight: 600; color: #1c1c1e; margin-bottom: 12px"
                    >
                      Location
                    </div>
                    <label
                      style="
                        display: block;
                        font-size: 12px;
                        font-weight: 500;
                        color: #6e6e73;
                        margin-bottom: 6px;
                      "
                      >Location Name</label
                    >
                    <input
                      type="text"
                      value="Basilisk Courtyard"
                      style="
                        width: 100%;
                        height: 36px;
                        border: 1px solid #e5e5e7;
                        border-radius: 7px;
                        padding: 0 10px;
                        font-size: 13px;
                        color: #1c1c1e;
                        font-family: 'Inter', sans-serif;
                        background: #fff;
                        margin-bottom: 10px;
                      "
                    />
                    <!-- Map placeholder -->
                    <div
                      style="
                        width: 100%;
                        height: 140px;
                        background: linear-gradient(180deg, #c8d8c0 0%, #b0c8a8 100%);
                        border-radius: 8px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        position: relative;
                        overflow: hidden;
                      "
                    >
                      <div
                        style="
                          position: absolute;
                          left: 25%;
                          top: 0;
                          bottom: 0;
                          width: 1px;
                          background: rgba(80, 110, 80, 0.3);
                        "
                      ></div>
                      <div
                        style="
                          position: absolute;
                          left: 50%;
                          top: 0;
                          bottom: 0;
                          width: 1px;
                          background: rgba(80, 110, 80, 0.3);
                        "
                      ></div>
                      <div
                        style="
                          position: absolute;
                          left: 75%;
                          top: 0;
                          bottom: 0;
                          width: 1px;
                          background: rgba(80, 110, 80, 0.3);
                        "
                      ></div>
                      <div
                        style="
                          position: absolute;
                          top: 33%;
                          left: 0;
                          right: 0;
                          height: 1px;
                          background: rgba(80, 110, 80, 0.3);
                        "
                      ></div>
                      <div
                        style="
                          position: absolute;
                          top: 66%;
                          left: 0;
                          right: 0;
                          height: 1px;
                          background: rgba(80, 110, 80, 0.3);
                        "
                      ></div>
                      <svg width="24" height="30" viewBox="0 0 24 30">
                        <path
                          d="M12 2C7 2 3 6 3 11C3 18 12 28 12 28C12 28 21 18 21 11C21 6 17 2 12 2Z"
                          fill="#F5A623"
                          opacity="0.95"
                        />
                        <circle cx="12" cy="11" r="4" fill="#fff" />
                      </svg>
                    </div>
                    <div
                      style="
                        margin-top: 8px;
                        font-size: 13px;
                        color: #f5a623;
                        font-weight: 500;
                        cursor: pointer;
                      "
                    >
                      Change on map →
                    </div>
                  </div>

                  <!-- Attempts before hint -->
                  <div style="background: #f5f5f7; border-radius: 12px; padding: 16px">
                    <div
                      style="font-size: 13px; font-weight: 600; color: #1c1c1e; margin-bottom: 12px"
                    >
                      Attempts before hint
                    </div>
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: 0;
                        border: 1px solid #e5e5e7;
                        border-radius: 8px;
                        overflow: hidden;
                        width: fit-content;
                        background: #fff;
                      "
                    >
                      <button
                        style="
                          width: 36px;
                          height: 36px;
                          background: #f5f5f7;
                          border: none;
                          border-right: 1px solid #e5e5e7;
                          cursor: pointer;
                          font-size: 18px;
                          color: #1c1c1e;
                          font-family: 'Inter', sans-serif;
                        "
                      >
                        −
                      </button>
                      <div
                        style="
                          width: 40px;
                          text-align: center;
                          font-size: 14px;
                          font-weight: 600;
                          color: #1c1c1e;
                          font-family: 'Inter', sans-serif;
                        "
                      >
                        5
                      </div>
                      <button
                        style="
                          width: 36px;
                          height: 36px;
                          background: #f5f5f7;
                          border: none;
                          border-left: 1px solid #e5e5e7;
                          cursor: pointer;
                          font-size: 18px;
                          color: #1c1c1e;
                          font-family: 'Inter', sans-serif;
                        "
                      >
                        +
                      </button>
                    </div>
                  </div>

                  <!-- Media upload -->
                  <div
                    style="
                      background: #f5f5f7;
                      border-radius: 12px;
                      padding: 24px;
                      border: 1.5px dashed #e5e5e7;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      gap: 10px;
                      cursor: pointer;
                    "
                  >
                    <svg
                      width="32"
                      height="32"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="#C7C7CC"
                      strokeWidth="2"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    >
                      <rect x="3" y="3" width="18" height="18" rx="2" />
                      <circle cx="8.5" cy="8.5" r="1.5" />
                      <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span style="font-size: 13px; color: #6e6e73"
                      >Drop image or click to upload</span
                    >
                  </div>

                  <!-- Preview link -->
                  <div style="text-align: right">
                    <span style="font-size: 14px; font-weight: 600; color: #f5a623; cursor: pointer"
                      >Preview as Player →</span
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>
        </x-import>
      </div>
    </x-dc>
    <script type="text/x-dc" data-dc-script data-props='{"$preview":{"width":1500,"height":900}}'>
      class Component extends DCLogic {
        renderVals() {
          return { w: 1440, h: 830 };
        }
      }
    </script>
  </body>
</html>
