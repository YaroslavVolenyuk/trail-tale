<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    input::placeholder { color: #8E8E93 !important; opacity: 1; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</helmet>

<div style="min-height:100vh; background:#1A1A1A; display:flex; align-items:center; justify-content:center; padding:48px 24px; font-family:'Inter',sans-serif;">
  <x-import component="IOSDevice" from="./ios-frame.jsx" dark="{{ true }}" hint-size="402px,874px">
    <div style="height:100%; display:flex; flex-direction:column; background:#0A0A0A; font-family:'Inter',sans-serif;">

      <div style="height:59px; flex-shrink:0;"></div>

      <!-- Top bar -->
      <div style="flex-shrink:0; display:flex; align-items:center; padding:6px 12px; height:50px;">
        <div style="width:44px; height:44px; display:flex; align-items:center; cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </div>
        <div style="flex:1; text-align:center; font-size:17px; font-weight:600; color:#fff; margin-right:44px; font-family:'Inter',sans-serif;">Team</div>
      </div>

      <!-- Scrollable content -->
      <div style="flex:1; overflow-y:auto; padding:24px 24px;">

        <!-- Create a Team -->
        <div style="font-size:12px; font-weight:500; color:#8E8E93; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px; font-family:'Inter',sans-serif;">Create a Team</div>
        <input
          type="text"
          value="{{ teamName }}"
          onChange="{{ onTeamName }}"
          onFocus="{{ onFocusTeam }}"
          onBlur="{{ onBlurAll }}"
          placeholder="Team name"
          style="width:100%; height:52px; background:#1C1C1E; border:{{ teamBorder }}; border-radius:12px; color:#fff; font-size:17px; font-weight:400; padding:0 16px; font-family:'Inter',sans-serif; box-sizing:border-box; transition:border-color 0.15s;"
        />
        <p style="font-size:13px; color:#8E8E93; margin:8px 0 20px; font-family:'Inter',sans-serif; line-height:1.4;">You'll get a 6-character join code to share.</p>
        <button style="width:100%; height:52px; background:#F5A623; border:none; border-radius:14px; color:#0A0A0A; font-size:17px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer;">Create Team</button>

        <!-- Divider -->
        <div style="display:flex; align-items:center; gap:12px; margin:28px 0;">
          <div style="flex:1; height:1px; background:#2C2C2E;"></div>
          <span style="font-size:13px; color:#8E8E93; font-family:'Inter',sans-serif;">or</span>
          <div style="flex:1; height:1px; background:#2C2C2E;"></div>
        </div>

        <!-- Join a Team -->
        <div style="font-size:12px; font-weight:500; color:#8E8E93; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px; font-family:'Inter',sans-serif;">Join a Team</div>
        <input
          type="text"
          value="{{ joinCode }}"
          onChange="{{ onJoinCode }}"
          onFocus="{{ onFocusJoin }}"
          onBlur="{{ onBlurAll }}"
          placeholder="Enter code — e.g. WLF-47"
          style="width:100%; height:52px; background:#1C1C1E; border:{{ joinBorder }}; border-radius:12px; color:#fff; font-size:17px; font-weight:500; padding:0 16px; font-family:'Inter',sans-serif; box-sizing:border-box; letter-spacing:{{ joinSpacing }}; transition:border-color 0.15s;"
        />
        <div style="height:16px;"></div>
        <button style="width:100%; height:52px; background:#2C2C2E; border:none; border-radius:14px; color:#fff; font-size:17px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer;">Join</button>

        <div style="height:36px;"></div>
      </div>

    </div>
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:960}}">
class Component extends DCLogic {
  state = { teamName: '', joinCode: '', focus: null };
  renderVals() {
    const { teamName, joinCode, focus } = this.state;
    return {
      teamName, joinCode,
      onTeamName: (e) => this.setState({ teamName: e.target.value }),
      onJoinCode: (e) => this.setState({ joinCode: e.target.value }),
      onFocusTeam: () => this.setState({ focus: 'team' }),
      onFocusJoin: () => this.setState({ focus: 'join' }),
      onBlurAll: () => this.setState({ focus: null }),
      teamBorder: focus === 'team' ? '1.5px solid #F5A623' : '1.5px solid #3A3A3C',
      joinBorder: focus === 'join' ? '1.5px solid #F5A623' : '1.5px solid #3A3A3C',
      joinSpacing: joinCode.length > 0 ? '0.15em' : 'normal',
    };
  }
}
</script>
</body>
</html>
